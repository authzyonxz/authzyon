<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AuthZyon</title>

    <!-- PWA: Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA: Theme color (Android/Chrome) -->
    <meta name="theme-color" content="#0f0f19" />

    <!-- PWA: iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AuthZyon" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA: Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Painel Administrativo de Autenticação AuthZyon" />
    <meta name="application-name" content="AuthZyon" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0f0f19" />
    <meta name="msapplication-TileImage" content="/pwa-144x144.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
